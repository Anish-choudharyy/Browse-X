<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse-X — Discover Cinema</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER / NAVBAR
  ═══════════════════════════════════════════ -->
  <header class="header">
    <div class="header__inner">
      <a class="logo" href="#">
        <span class="logo__bracket">[</span>
        Browse<span class="logo__accent">-X</span>
        <span class="logo__bracket">]</span>
      </a>

      <nav class="nav-actions">
        <!-- Favorites toggle -->
        <button class="btn-icon" id="favBtn" aria-label="View Favourites" title="Favourites">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="fav-badge" id="favBadge">0</span>
        </button>

        <!-- Dark mode toggle -->
        <button class="btn-icon theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon theme-icon--sun">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </span>
          <span class="theme-icon theme-icon--moon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       HERO / SEARCH SECTION
  ═══════════════════════════════════════════ -->
  <section class="hero">
    <div class="hero__grain"></div>
    <div class="hero__inner">
      <p class="hero__eyebrow">Your personal cinema guide</p>
      <h1 class="hero__title">
        DISCOVER<br />
        <span class="hero__title--accent">CINEMA</span>
      </h1>

      <!-- Search bar -->
      <div class="search-wrap">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search for a movie, series…"
            autocomplete="off"
            aria-label="Search movies"
          />
          <button class="search-clear" id="clearBtn" aria-label="Clear search">✕</button>
        </div>
        <button class="btn-primary" id="searchBtn">Search</button>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       CONTROLS — Sort / Filter / Results count
  ═══════════════════════════════════════════ -->
  <section class="controls" id="controls" aria-label="Filter and Sort">
    <div class="controls__inner">
      <p class="results-count" id="resultsCount"></p>

      <div class="controls__right">
        <!-- Type filter -->
        <div class="select-wrap">
          <select id="typeFilter" aria-label="Filter by type" class="control-select">
            <option value="">All Types</option>
            <option value="movie">Movies</option>
            <option value="series">Series</option>
            <option value="episode">Episodes</option>
          </select>
        </div>

        <!-- Year filter -->
        <div class="select-wrap">
          <select id="yearFilter" aria-label="Filter by decade" class="control-select">
            <option value="">Any Year</option>
            <option value="2020">2020s</option>
            <option value="2010">2010s</option>
            <option value="2000">2000s</option>
            <option value="1990">1990s</option>
            <option value="1980">1980s &amp; older</option>
          </select>
        </div>

        <!-- Sort -->
        <div class="select-wrap">
          <select id="sortOrder" aria-label="Sort results" class="control-select">
            <option value="default">Relevance</option>
            <option value="az">Title A → Z</option>
            <option value="za">Title Z → A</option>
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT AREA
  ═══════════════════════════════════════════ -->
  <main class="main" id="main">

    <!-- Loading skeletons -->
    <div class="skeleton-grid" id="skeletonGrid" hidden>
      <!-- JS will inject skeleton cards -->
    </div>

    <!-- Error / Empty state -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-state__icon">🎬</div>
      <h2 class="empty-state__title" id="emptyTitle">No Results Found</h2>
      <p class="empty-state__sub" id="emptySub">Try a different search term or adjust your filters.</p>
    </div>

    <!-- Results grid -->
    <div class="movie-grid" id="movieGrid" aria-label="Movie results"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" hidden>
      <button class="btn-page" id="prevBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <span class="pagination__info" id="pageInfo">Page 1</span>
      <button class="btn-page" id="nextBtn">
        Next
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       FAVORITES PANEL (slide-in drawer)
  ═══════════════════════════════════════════ -->
  <aside class="fav-panel" id="favPanel" aria-label="Favourites" role="dialog" aria-modal="true" hidden>
    <div class="fav-panel__overlay" id="favOverlay"></div>
    <div class="fav-panel__drawer">
      <div class="fav-panel__header">
        <h2>My Favourites</h2>
        <button class="btn-icon" id="closeFavBtn" aria-label="Close favourites">✕</button>
      </div>
      <div class="fav-panel__body" id="favList">
        <!-- Favourite cards injected by JS -->
      </div>
      <div class="fav-panel__empty" id="favEmpty" hidden>
        <p>No favourites yet.<br/>Hit ♥ on any movie card.</p>
      </div>
    </div>
  </aside>

  <!-- Movie Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal__content" id="modalContent"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="footer">
    <p>Browse-X &copy; 2025 &nbsp;·&nbsp; Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB API</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
