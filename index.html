<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse-X — Discover Cinema</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="header__inner">

      <a class="logo" href="#">
        <span class="logo__bracket">[</span>
        Browse<span class="logo__accent">-X</span>
        <span class="logo__bracket">]</span>
      </a>

      <button class="btn-icon" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon theme-icon--sun">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </span>
        <span class="theme-icon theme-icon--moon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </span>
      </button>

    </div>
  </header>

  <section class="hero">
    <div class="hero__grain"></div>
    <div class="hero__inner">

      <p class="hero__eyebrow">Your personal cinema guide</p>

      <h1 class="hero__title">
        DISCOVER<br />
        <span class="hero__title--accent">CINEMA</span>
      </h1>

      <div class="search-wrap">
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search for a movie, series…" autocomplete="off" />
          <button class="search-clear" id="clearBtn">✕</button>
        </div>
        <button class="btn-primary" id="searchBtn">Search</button>
      </div>

    </div>
  </section>


  <section class="controls">
    <div class="controls__inner">

      <p class="results-count" id="resultsCount"></p>

      <div class="controls__right">

        <select id="typeFilter" class="control-select">
          <option value="">All Types</option>
          <option value="movie">Movies</option>
          <option value="tv">TV Shows</option>
        </select>

        <select id="yearFilter" class="control-select">
          <option value="">Any Year</option>
          <option value="2020">2020s</option>
          <option value="2010">2010s</option>
          <option value="2000">2000s</option>
          <option value="1990">1990s</option>
          <option value="1980">1980s &amp; older</option>
        </select>

        <select id="sortOrder" class="control-select">
          <option value="default">Relevance</option>
          <option value="az">Title A → Z</option>
          <option value="za">Title Z → A</option>
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>

      </div>
    </div>
  </section>


  <main class="main">

    <div class="skeleton-grid" id="skeletonGrid" hidden></div>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-state__icon">🎬</div>
      <h2 class="empty-state__title" id="emptyTitle">No Results Found</h2>
      <p class="empty-state__sub" id="emptySub">Try a different search term or adjust your filters.</p>
    </div>

    <div class="movie-grid" id="movieGrid"></div>

    <div class="pagination" id="pagination" hidden>
      <button class="btn-page" id="prevBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
        Prev
      </button>
      <span class="pagination__info" id="pageInfo">Page 1</span>
      <button class="btn-page" id="nextBtn">
        Next
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

  </main>


  <footer class="footer">
    <p>Browse-X &copy; 2025 &nbsp;·&nbsp; Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB API</a></p>
  </footer>


  <script src="script.js"></script>
</body>
</html>
